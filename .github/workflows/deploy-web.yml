name: Deploy Web to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create .env for Expo web build
        env:
          DOTENV: ${{ secrets.DOTENV }}
        run: |
          cp .env.production .env
          if [ -n "$DOTENV" ]; then
            printf '%s' "$DOTENV" | tr -d '\r' > .env
            echo "Using DOTENV secret override"
          else
            echo "Using committed .env.production"
          fi
          sed -i 's/\r$//' .env

      - name: Verify .env for web build
        run: |
          API_KEY="$(grep '^EXPO_PUBLIC_FIREBASE_API_KEY=' .env | cut -d= -f2- | tr -d '\r' | xargs)"
          if [ -z "$API_KEY" ]; then
            echo "Missing EXPO_PUBLIC_FIREBASE_API_KEY in .env"
            exit 1
          fi
          echo "Firebase API key present (${#API_KEY} chars)"

      - name: Build static web export
        run: npm run build:web:github

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
