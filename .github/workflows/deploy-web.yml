name: Deploy Web to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create .env for Expo web build
        env:
          DOTENV: ${{ secrets.DOTENV }}
          EXPO_PUBLIC_FIREBASE_API_KEY: ${{ secrets.EXPO_PUBLIC_FIREBASE_API_KEY }}
          EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          EXPO_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_PROJECT_ID }}
          EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          EXPO_PUBLIC_FIREBASE_APP_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_APP_ID }}
          EXPO_PUBLIC_FIREBASE_MEASUREMENT_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_MEASUREMENT_ID }}
          EXPO_PUBLIC_STRIPE_SECRET_KEY: ${{ secrets.EXPO_PUBLIC_STRIPE_SECRET_KEY }}
          EXPO_PUBLIC_STRIPE_WEBHOOK_SECRET: ${{ secrets.EXPO_PUBLIC_STRIPE_WEBHOOK_SECRET }}
          EXPO_PUBLIC_PROJECT_ID: ${{ secrets.EXPO_PUBLIC_PROJECT_ID }}
        run: |
          if [ -n "$DOTENV" ]; then
            printf '%s\n' "$DOTENV" > .env
            echo "Created .env from DOTENV secret"
          else
            cat > .env <<EOF
          EXPO_PUBLIC_FIREBASE_API_KEY=${EXPO_PUBLIC_FIREBASE_API_KEY}
          EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN=${EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN}
          EXPO_PUBLIC_FIREBASE_PROJECT_ID=${EXPO_PUBLIC_FIREBASE_PROJECT_ID}
          EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET=${EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET}
          EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID}
          EXPO_PUBLIC_FIREBASE_APP_ID=${EXPO_PUBLIC_FIREBASE_APP_ID}
          EXPO_PUBLIC_FIREBASE_MEASUREMENT_ID=${EXPO_PUBLIC_FIREBASE_MEASUREMENT_ID}
          EXPO_PUBLIC_STRIPE_SECRET_KEY=${EXPO_PUBLIC_STRIPE_SECRET_KEY}
          EXPO_PUBLIC_STRIPE_WEBHOOK_SECRET=${EXPO_PUBLIC_STRIPE_WEBHOOK_SECRET}
          EXPO_PUBLIC_PROJECT_ID=${EXPO_PUBLIC_PROJECT_ID}
          EXPO_PUBLIC_APP_URL=https://app.scan-perks.com
          EXPO_PUBLIC_API_URL=https://app.scan-perks.com
          EOF
            echo "Created .env from individual repository secrets"
          fi

      - name: Verify .env for web build
        run: |
          if ! grep -q '^EXPO_PUBLIC_FIREBASE_API_KEY=.\+' .env; then
            echo ""
            echo "Missing Firebase config for the web build."
            echo "Add ONE repository secret named DOTENV with your full local .env file,"
            echo "or add each EXPO_PUBLIC_* secret separately in GitHub Settings."
            echo ""
            exit 1
          fi

      - name: Build static web export
        run: npm run build:web:github

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
